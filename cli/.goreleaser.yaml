version: 2

project_name: gofi

before:
  hooks:
    - go mod tidy

builds:
  - id: gofi
    main: ./cmd
    binary: gofi
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/joaoprofile/gofi-cli/internal/cli.Version={{.Version}}
      - -X github.com/joaoprofile/gofi-cli/internal/cli.Commit={{.ShortCommit}}
      - -X github.com/joaoprofile/gofi-cli/internal/cli.BuildDate={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - src: ../README.md
        dst: README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  draft: false
  prerelease: auto
  replace_existing_artifacts: true
