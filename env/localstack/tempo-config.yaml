server:
  http_listen_port: 3200

storage:
  trace:
    backend: s3
    s3:
      bucket: tempo
      endpoint: minio:9000
      access_key: lokiuser
      secret_key: lokipassword
      region: us-east-1
      insecure: true
      forcepathstyle: true  
    wal:
      path: /var/lib/tempo/wal
    local:
      path: /var/lib/tempo/blocks

memberlist:
  abort_if_cluster_join_fails: false
  join_members:
    - tempo:7946

compactor:
  ring:
    kvstore:
      store: memberlist

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m